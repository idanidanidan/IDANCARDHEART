<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול - לב גדול לכולם</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Assistant", "Segoe UI", Arial, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .admin-layout {
            display: flex;
            height: 100vh;
        }
        /* ===== RIGHT PANEL: Editor (RTL so it's on the right) ===== */
        .editor-panel {
            width: 420px;
            min-width: 420px;
            background: #1a1a2e;
            border-left: 2px solid #40AEC6;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .editor-panel h1 {
            font-size: 22px;
            color: #40AEC6;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .editor-panel h1 span {
            font-size: 14px;
            color: #888;
            display: block;
            margin-top: 4px;
        }
        /* Lock overlay */
        .lock-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0f0f0f;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        .lock-overlay.hidden { display: none; }
        .lock-box {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 14px;
            padding: 40px 36px;
            text-align: center;
            max-width: 360px;
            width: 90%;
        }
        .lock-box .lock-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .lock-box h2 {
            color: #40AEC6;
            font-size: 20px;
            margin-bottom: 6px;
        }
        .lock-box p {
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .lock-box input {
            width: 100%;
            padding: 12px;
            background: #0f0f0f;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            text-align: center;
            direction: ltr;
        }
        .lock-box input:focus {
            outline: none;
            border-color: #40AEC6;
            box-shadow: 0 0 0 2px rgba(64,174,198,0.2);
        }
        .lock-box .lock-btn {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: #40AEC6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .lock-box .lock-btn:hover {
            background: #35929e;
        }
        .lock-box .lock-error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 10px;
            min-height: 18px;
        }
        .section-card {
            background: #16213e;
            border-radius: 10px;
            padding: 16px;
            border: 1px solid #333;
            transition: border-color 0.3s;
        }
        .section-card:hover {
            border-color: #40AEC6;
        }
        .section-card label {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #40AEC6;
            margin-bottom: 10px;
        }
        .section-card label .label-icon {
            margin-left: 6px;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            background: #0f0f0f;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            direction: rtl;
        }
        textarea:focus {
            outline: none;
            border-color: #40AEC6;
            box-shadow: 0 0 0 2px rgba(64,174,198,0.2);
        }
        /* Image upload */
        .upload-area {
            position: relative;
            border: 2px dashed #444;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #0f0f0f;
        }
        .upload-area:hover {
            border-color: #40AEC6;
            background: #1a1a2e;
        }
        .upload-area img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .upload-area .upload-text {
            color: #888;
            font-size: 13px;
        }
        .upload-area input[type="file"] {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0;
            cursor: pointer;
        }
        /* Buttons */
        .btn-row {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-save {
            background: #40AEC6;
            color: #fff;
        }
        .btn-save:hover {
            background: #35929e;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(64,174,198,0.3);
        }
        .btn-reset {
            background: #c0392b;
            color: #fff;
        }
        .btn-reset:hover {
            background: #a93226;
        }
        /* Status */
        .status-bar {
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .status-bar.show {
            opacity: 1;
        }
        .status-bar.success {
            background: rgba(39,174,96,0.2);
            color: #27ae60;
            border: 1px solid #27ae60;
        }
        .status-bar.error {
            background: rgba(192,57,43,0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }
        /* ===== LEFT PANEL: Live Preview ===== */
        .preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111;
        }
        .preview-header {
            background: #1a1a2e;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        .preview-header span {
            color: #888;
            font-size: 13px;
        }
        .preview-header .dot {
            width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px;
        }
        .dot-red { background: #e74c3c; }
        .dot-yellow { background: #f1c40f; }
        .dot-green { background: #27ae60; }
        .preview-panel iframe {
            flex: 1;
            border: none;
            background: #fff;
        }
        /* Back link */
        .back-link {
            text-align: center;
            padding: 6px;
        }
        .back-link a {
            color: #666;
            font-size: 12px;
            text-decoration: none;
        }
        .back-link a:hover { color: #40AEC6; }
        /* Scrollbar */
        .editor-panel::-webkit-scrollbar { width: 6px; }
        .editor-panel::-webkit-scrollbar-track { background: #1a1a2e; }
        .editor-panel::-webkit-scrollbar-thumb { background: #40AEC6; border-radius: 3px; }
    </style>
</head>
<body>
    <!-- Lock Screen -->
    <div class="lock-overlay" id="lockOverlay">
        <div class="lock-box">
            <div class="lock-icon">&#x2764;&#xFE0F;</div>
            <h2>לב גדול לכולם</h2>
            <input type="password" id="lockInput" placeholder="" autofocus style="border:none;background:transparent;color:transparent;caret-color:#40AEC6;text-align:center;">
            <button class="lock-btn" id="lockBtn" style="display:none;"></button>
            <div class="lock-error" id="lockError"></div>
        </div>
    </div>

    <div class="admin-layout" id="adminPanel" style="display:none;">
        <!-- ===== EDITOR PANEL ===== -->
        <div class="editor-panel">
            <h1>
                &#x1F6E0;&#xFE0F; ניהול תוכן
                <span>עריכת תוכן הדף</span>
            </h1>

            <div id="statusBar" class="status-bar"></div>

            <!-- 1. Logo Image -->
            <div class="section-card">
                <label><span class="label-icon">&#x1F5BC;&#xFE0F;</span> לוגו / תמונה ראשית</label>
                <div class="upload-area" id="uploadArea">
                    <img id="logoPreview" src="images/heart.jfif" alt="תצוגה מקדימה">
                    <div class="upload-text">לחץ כאן או גרור תמונה חדשה</div>
                    <input type="file" id="logoInput" accept="image/*">
                </div>
            </div>

            <!-- 2. Main Description -->
            <div class="section-card">
                <label><span class="label-icon">&#x1F4DD;</span> תיאור ראשי</label>
                <textarea id="mainText" rows="8" placeholder="הטקסט הראשי שמופיע מתחת ללוגו..."></textarea>
            </div>

            <!-- 3. Hours & Location -->
            <div class="section-card">
                <label><span class="label-icon">&#x1F550;</span> שעות ומיקום</label>
                <textarea id="hoursText" rows="6" placeholder="שעות פעילות ומיקומי איסוף..."></textarea>
            </div>

            <!-- 4. Donation Options -->
            <div class="section-card">
                <label><span class="label-icon">&#x1F381;</span> אפשרויות להתרמה</label>
                <textarea id="donationText" rows="6" placeholder="רשימת מוצרים ואפשרויות תרומה..."></textarea>
            </div>

            <!-- 5. Summary -->
            <div class="section-card">
                <label><span class="label-icon">&#x1F4CB;</span> לסיכום</label>
                <textarea id="summaryText" rows="6" placeholder="טקסט סיכום..."></textarea>
            </div>

            <!-- Buttons -->
            <div class="btn-row">
                <button class="btn btn-save" id="btnSave">&#x1F4BE; שמור שינויים</button>
                <button class="btn btn-reset" id="btnReset">&#x1F504; אפס הכל</button>
            </div>

            <div class="back-link">
                <a href="index.html">&larr; חזרה לדף הראשי</a>
            </div>
        </div>

        <!-- ===== LIVE PREVIEW ===== -->
        <div class="preview-panel">
            <div class="preview-header">
                <span>תצוגה מקדימה חיה</span>
                <div>
                    <span class="dot dot-green"></span>
                    <span class="dot dot-yellow"></span>
                    <span class="dot dot-red"></span>
                </div>
            </div>
            <iframe id="previewFrame" src="index.html"></iframe>
        </div>
    </div>

    <script>
    // ===== Config =====
    var ENC_SALT = '+t8Rcq5tNAcL6cDq+mhc9Q==';
    var ENC_IV = 'JSQ/ZSwgxdzTwKHqlOjv6A==';
    var ENC_CT = 'Q9sfp4Qtm2P+GCPO6cShFQ+Qyu+tqCoKasLD9jGgTh/ttMy+9WdZ4m/Dc9m750V8';
    var GH_OWNER = 'idanidanidan';
    var GH_REPO = 'IDANCARDHEART';
    var GH_FILE = 'data.json';
    var PW_HASH = '2b756c41351d73f21557e0a65ddbadec8633106c3e8abe974288abddef25773c';
    var _ghToken = null;

    // ===== Crypto =====
    async function sha256(str) {
        var buf = new TextEncoder().encode(str);
        var hashBuf = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hashBuf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
    }

    async function decryptPAT(password) {
        var enc = new TextEncoder();
        var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
        var salt = Uint8Array.from(atob(ENC_SALT), function(c){ return c.charCodeAt(0); });
        var iv = Uint8Array.from(atob(ENC_IV), function(c){ return c.charCodeAt(0); });
        var ct = Uint8Array.from(atob(ENC_CT), function(c){ return c.charCodeAt(0); });
        var key = await crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-1' },
            keyMaterial,
            { name: 'AES-CBC', length: 256 },
            false, ['decrypt']
        );
        var decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv: iv }, key, ct);
        return new TextDecoder().decode(decrypted);
    }

    // ===== GitHub API =====
    async function ghGet(path) {
        return await fetch('https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + path, {
            headers: { 'Authorization': 'token ' + _ghToken, 'Accept': 'application/vnd.github+json' }
        });
    }

    async function ghPut(path, content, sha) {
        var b64 = btoa(unescape(encodeURIComponent(content)));
        var body = { message: 'עדכון תוכן מפאנל ניהול', content: b64 };
        if (sha) body.sha = sha;
        var resp = await fetch('https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + path, {
            method: 'PUT',
            headers: { 'Authorization': 'token ' + _ghToken, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!resp.ok) { var e = await resp.json(); throw new Error(e.message || 'GitHub error'); }
        return await resp.json();
    }

    // ===== Main App =====
    document.addEventListener('DOMContentLoaded', function() {
        var overlay = document.getElementById('lockOverlay');
        var panel = document.getElementById('adminPanel');
        var input = document.getElementById('lockInput');
        var btn = document.getElementById('lockBtn');
        var errEl = document.getElementById('lockError');
        var logoInput = document.getElementById('logoInput');
        var logoPreview = document.getElementById('logoPreview');
        var mainText = document.getElementById('mainText');
        var hoursText = document.getElementById('hoursText');
        var donationText = document.getElementById('donationText');
        var summaryText = document.getElementById('summaryText');
        var btnSave = document.getElementById('btnSave');
        var btnReset = document.getElementById('btnReset');
        var statusBar = document.getElementById('statusBar');
        var previewFrame = document.getElementById('previewFrame');
        var currentLogoData = null;

        // ===== Helpers =====
        function showStatus(msg, type) {
            statusBar.textContent = msg;
            statusBar.className = 'status-bar show ' + type;
            setTimeout(function(){ statusBar.className = 'status-bar'; }, 5000);
        }

        function htmlToPlainLines(html) {
            var text = html || '';
            text = text.replace(/<br\s*\/?>/gi, '\n');
            text = text.replace(/<\/p>\s*<p[^>]*>/gi, '\n\n');
            text = text.replace(/<[^>]+>/g, '');
            text = text.replace(/&#8217;/g, "'");
            text = text.replace(/&nbsp;/g, ' ');
            text = text.replace(/&amp;/g, '&');
            return text.trim();
        }

        function plainToHoursHtml(text) {
            var lines = text.split('\n');
            var html = '';
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line) html += '<p style="text-align: center;"><span style="color: #ffffff;">' + line + '</span></p>';
            }
            return html;
        }

        // ===== Load content from GitHub API =====
        async function loadFromGitHub() {
            try {
                var resp = await ghGet(GH_FILE);
                if (resp.ok) {
                    var info = await resp.json();
                    var raw = decodeURIComponent(escape(atob(info.content.replace(/\n/g, ''))));
                    var data = JSON.parse(raw);
                    if (data.logo_image) { currentLogoData = data.logo_image; logoPreview.src = data.logo_image; }
                    if (data.main_text) mainText.value = htmlToPlainLines(data.main_text);
                    if (data.hours_text) hoursText.value = htmlToPlainLines(data.hours_text);
                    if (data.donation_text) donationText.value = htmlToPlainLines(data.donation_text);
                    if (data.summary_text) summaryText.value = htmlToPlainLines(data.summary_text);
                    return true;
                }
            } catch(e) { console.log('GitHub load error:', e); }
            return false;
        }

        function loadFromIframe() {
            previewFrame.addEventListener('load', function onLoad() {
                try {
                    var doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
                    if (!mainText.value) { var el = doc.querySelector('[data-id="75f73bb"] .elementor-heading-title'); if(el) mainText.value = htmlToPlainLines(el.innerHTML); }
                    if (!hoursText.value) { var el2 = doc.querySelector('[data-id="6a11a3c"] .elementor-widget-container'); if(el2) hoursText.value = htmlToPlainLines(el2.innerHTML); }
                    if (!donationText.value) { var el3 = doc.querySelector('[data-id="6fcf8ed"] .elementor-heading-title'); if(el3) donationText.value = htmlToPlainLines(el3.innerHTML); }
                    if (!summaryText.value) { var el4 = doc.querySelector('[data-id="5333c9a"] .elementor-heading-title'); if(el4) summaryText.value = htmlToPlainLines(el4.innerHTML); }
                } catch(e) {}
                previewFrame.removeEventListener('load', onLoad);
            });
        }

        async function initAdmin() {
            showStatus('⏳ טוען תוכן מ-GitHub...', 'success');
            var loaded = await loadFromGitHub();
            if (!loaded) loadFromIframe();
            showStatus('', '');
            statusBar.className = 'status-bar';
        }

        // ===== Lock Screen =====
        async function verify() {
            var val = input.value;
            if (!val) { errEl.textContent = '\u05D4\u05D6\u05DF \u05E7\u05D5\u05D3'; return; }
            var h = await sha256(val);
            if (h === PW_HASH) {
                try {
                    _ghToken = await decryptPAT(val);
                    sessionStorage.setItem('_a_verified', '1');
                    sessionStorage.setItem('_gh_t', _ghToken);
                    overlay.classList.add('hidden');
                    panel.style.display = '';
                    initAdmin();
                } catch(e) {
                    errEl.textContent = '\u05E9\u05D2\u05D9\u05D0\u05D4 \u05D1\u05E4\u05E2\u05E0\u05D5\u05D7';
                    console.error(e);
                }
            } else {
                errEl.textContent = '\u05E7\u05D5\u05D3 \u05E9\u05D2\u05D5\u05D9';
                input.value = '';
                input.focus();
            }
        }

        // Check if already verified this session
        if (sessionStorage.getItem('_a_verified') === '1' && sessionStorage.getItem('_gh_t')) {
            _ghToken = sessionStorage.getItem('_gh_t');
            overlay.classList.add('hidden');
            panel.style.display = '';
            initAdmin();
        }

        btn.addEventListener('click', verify);
        input.addEventListener('keydown', function(e){ if(e.key==='Enter') verify(); });

        // ===== Image upload =====
        logoInput.addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { showStatus('התמונה גדולה מדי (מקסימום 2MB)', 'error'); return; }
            var reader = new FileReader();
            reader.onload = function(ev) {
                currentLogoData = ev.target.result;
                logoPreview.src = currentLogoData;
                showStatus('התמונה הועלתה - לחץ שמור', 'success');
            };
            reader.readAsDataURL(file);
        });

        // ===== SAVE to GitHub =====
        btnSave.addEventListener('click', async function() {
            if (!_ghToken) { showStatus('לא מחובר - רענן את הדף', 'error'); return; }
            btnSave.disabled = true;
            btnSave.textContent = '⏳ שומר ל-GitHub...';
            try {
                var data = {
                    logo_image: currentLogoData || null,
                    main_text: mainText.value.trim() ? mainText.value.trim().replace(/\n/g, '<br>\n') : null,
                    hours_text: hoursText.value.trim() ? plainToHoursHtml(hoursText.value) : null,
                    donation_text: donationText.value.trim() ? '\n' + donationText.value.trim().replace(/\n/g, '<br>\n') + '\n' : null,
                    summary_text: summaryText.value.trim() ? '\n' + summaryText.value.trim().replace(/\n/g, '<br>\n') : null
                };

                // Get current SHA
                var getResp = await ghGet(GH_FILE);
                var sha = null;
                if (getResp.ok) { var info = await getResp.json(); sha = info.sha; }

                // Commit to GitHub
                await ghPut(GH_FILE, JSON.stringify(data, null, 2), sha);

                // Update preview immediately via DOM
                try {
                    var doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
                    if (data.logo_image) { var img = doc.querySelector('[data-id="6f1d4c6"] img'); if(img) img.src = data.logo_image; }
                    if (data.main_text) { var el = doc.querySelector('[data-id="75f73bb"] .elementor-heading-title'); if(el) el.innerHTML = data.main_text; }
                    if (data.hours_text) { var el2 = doc.querySelector('[data-id="6a11a3c"] .elementor-widget-container'); if(el2) el2.innerHTML = data.hours_text; }
                    if (data.donation_text) { var el3 = doc.querySelector('[data-id="6fcf8ed"] .elementor-heading-title'); if(el3) el3.innerHTML = data.donation_text; }
                    if (data.summary_text) { var el4 = doc.querySelector('[data-id="5333c9a"] .elementor-heading-title'); if(el4) el4.innerHTML = data.summary_text; }
                } catch(e) {}

                showStatus('✅ נשמר בהצלחה! האתר יתעדכן תוך ~30 שניות', 'success');
            } catch(e) {
                showStatus('❌ שגיאה: ' + e.message, 'error');
            }
            btnSave.disabled = false;
            btnSave.textContent = '💾 שמור שינויים';
        });

        // ===== RESET =====
        btnReset.addEventListener('click', async function() {
            if (!confirm('האם אתה בטוח? כל השינויים יימחקו ויחזרו לברירת המחדל.')) return;
            if (!_ghToken) { showStatus('לא מחובר', 'error'); return; }
            btnReset.disabled = true;
            btnReset.textContent = '⏳ מאפס...';
            try {
                var data = { logo_image: null, main_text: null, hours_text: null, donation_text: null, summary_text: null };
                var getResp = await ghGet(GH_FILE);
                var sha = null;
                if (getResp.ok) { var info = await getResp.json(); sha = info.sha; }
                await ghPut(GH_FILE, JSON.stringify(data, null, 2), sha);
                currentLogoData = null;
                logoPreview.src = 'images/heart.jfif';
                mainText.value = ''; hoursText.value = ''; donationText.value = ''; summaryText.value = '';
                previewFrame.src = 'index.html?t=' + Date.now();
                showStatus('✅ הכל אופס! האתר יתעדכן תוך ~30 שניות', 'success');
            } catch(e) {
                showStatus('❌ שגיאה: ' + e.message, 'error');
            }
            btnReset.disabled = false;
            btnReset.textContent = '🔄 אפס הכל';
        });
    });
    </script>
